name: Docker

on:
  push:
    # On new version tag → tag as bgpkit/wayback-rpki:{version} and bgpkit/wayback-rpki:latest
    tags:
      - v[0-9]+.*
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for manual rebuild (e.g. 1.0.5) — pushes {version}, {major}.{minor}, and latest'
        required: true
        default: '1.0.5'

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive minor version for manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: ver
        run: |
          version="${{ inputs.version }}"
          major_minor=$(echo "$version" | cut -d. -f1,2)
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: bgpkit/wayback-rpki
          # On tag push: type=semver → "1.0.5", "1.0", and "latest"
          # On manual dispatch: type=raw uses the input version
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=${{ steps.ver.outputs.major_minor }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
